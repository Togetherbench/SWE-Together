version = "1.0"
[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "medium"
category = "feature"
tags = ["light-protocol", "rust", "solana", "macro", "ata"]
expert_time_estimate_min = 10.0
junior_time_estimate_min = 45.0
[verifier]
# `cargo test --release` on the light-protocol Solana workspace from a cold
# build does not fit in the 120s default — every cohort run (deepseek_v4_flash,
# deepseek_v4_pro, minimax_m25/m27, opus46) timed out at 120s with no reward
# file written. Bump to 30 min to cover release build + tests.
timeout_sec = 1800.0
[agent]
timeout_sec = 3600.0
[environment]
docker_image = "ghcr.io/togetherbench/multi-user-turn-codebench/light-protocol-implement-7adad1:3295bf62a3c0"
build_timeout_sec = 600.0
allow_internet = true
cpus = 4
memory = "4G"
storage = "10G"
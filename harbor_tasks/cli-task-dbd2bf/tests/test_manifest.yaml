version: "1.0"
task_id: cli-task-dbd2bf

gates:
  # --- GOLD: Behavioral core ---
  - id: F2P_NO_EAGER_DISCOVERY
    kind: F2P
    weight: 0.20
    description: |
      DiscoverAndRegister is NOT called eagerly in newHooksCmd's function body.
      Pre-patch: DiscoverAndRegister(discoveryCtx) called directly in newHooksCmd(),
      causing PATH scanning + process spawning on every CLI invocation.
      Post-patch: the call must be deferred (inside a RunE closure, or removed from
      the function body).

  - id: F2P_HOOKS_CMD_RUNE
    kind: F2P
    weight: 0.15
    description: |
      The hooks command in hooks_cmd.go has Args: cobra.ArbitraryArgs and a RunE
      handler that intercepts unrecognized subcommands (external agent hooks).
      This is the Cobra fallback mechanism that enables lazy discovery.

  - id: F2P_EXECUTE_AGENT_HOOK_FN
    kind: F2P
    weight: 0.15
    description: |
      An executeAgentHook function (or equivalent) exists in hook_registry.go
      containing the core hook execution logic: git repo check, enabled check,
      logging, event parsing, and lifecycle dispatch.
      Anti-stub: function body must have >3 substantive statements.

  # --- SILVER: Behavioral supporting ---
  - id: F2P_LAZY_DISCOVERY_IN_RUNE
    kind: F2P
    weight: 0.10
    description: |
      If DiscoverAndRegister appears in hooks_cmd.go, it is inside the RunE
      (lazy) path — called only when hooks are actually invoked for unknown agents.
      If DiscoverAndRegister is not in hooks_cmd.go at all, that also passes
      (the agent may place discovery elsewhere, e.g. only in setup.go).

  - id: F2P_SETUP_DISCOVERY
    kind: F2P
    weight: 0.10
    description: |
      setup.go imports agent/external and calls DiscoverAndRegister during the
      enable flow, so externally discovered agents appear in agent selection.

  - id: F2P_DELEGATION
    kind: F2P
    weight: 0.10
    description: |
      newAgentHookVerbCmdWithLogging in hook_registry.go delegates to a shared
      function rather than containing the full hook logic inline.
      The pre-patch version had ~70 lines of logic in the RunE closure.
      Post-patch: the RunE should be thin (< 8 substantive lines), delegating
      to a reusable function.

  # --- BRONZE: Structural quality ---
  - id: F2P_BUILDS
    kind: F2P
    weight: 0.10
    description: |
      The Go project compiles successfully (go build ./...).

  - id: F2P_TESTS_PASS
    kind: F2P
    weight: 0.10
    description: |
      Unit tests pass: go test ./cmd/entire/cli/...

  # --- P2P_REGRESSION: Gating-only ---
  - id: P2P_LINTER_SUPPRESSIONS
    kind: P2P
    weight: 0.0
    description: |
      Existing //nolint:ireturn comments in cmd/entire/cli/ are preserved.
      Count must be >= 7 (baseline from febf309b commit).
      Any removal zeroes the reward regardless of F2P scores.

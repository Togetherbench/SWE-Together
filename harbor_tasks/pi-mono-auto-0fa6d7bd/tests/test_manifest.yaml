- id: f2p_upstream_bash_timing
  kind: F2P
  turn: null
  weight: 0.20
  label: 'Behavioral vitest: bash timing wiring + Elapsed footer render'
  command: "cd /workspace/pi-mono && cd packages/tui && npx tsgo -p tsconfig.build.json\
    \ >/dev/null 2>&1 && cd /workspace/pi-mono && cat > packages/coding-agent/test/_f2p_upstream_bash_timing.test.ts\
    \ << 'VITESTEOF'\nimport { beforeAll, test, expect } from \"vitest\"; import stripAnsi\
    \ from \"strip-ansi\"; import type { TUI } from \"@mariozechner/pi-tui\"; import\
    \ { createBashToolDefinition } from \"../src/core/tools/bash.js\"; import { ToolExecutionComponent\
    \ } from \"../src/modes/interactive/components/tool-execution.js\"; import { initTheme\
    \ } from \"../src/modes/interactive/theme/theme.js\"; function createFakeTui():\
    \ TUI { return { requestRender: () => {} } as unknown as TUI; } beforeAll(() =>\
    \ { initTheme(\"dark\"); }); test(\"bash timing\", () => {\n  const bashDef =\
    \ createBashToolDefinition(process.cwd());\n  const component: any = new ToolExecutionComponent(\"\
    bash\", \"b1\", { command: \"echo hello\" }, {}, bashDef, createFakeTui(), process.cwd());\n\
    \  let startedOk = false;\n  if (typeof component.markExecutionStarted === \"\
    function\") { component.markExecutionStarted(); startedOk = true; }\n  if (typeof\
    \ component.setExecutionStartTimestamp === \"function\") { component.setExecutionStartTimestamp(Date.now()\
    \ - 12345); startedOk = true; }\n  expect(startedOk).toBe(true);\n  component.updateResult({\
    \ content: [{ type: \"text\", text: \"out\" }], isError: false }, true);\n  expect(stripAnsi(component.render(120).join(\"\
    \\n\"))).toMatch(/Elapsed \\d+\\.\\ds/);\n});\nVITESTEOF\nnode_modules/.bin/vitest\
    \ run packages/coding-agent/test/_f2p_upstream_bash_timing.test.ts >/dev/null\
    \ 2>&1; rc=$?; rm -f packages/coding-agent/test/_f2p_upstream_bash_timing.test.ts;\
    \ exit $rc"
  description: bash start wiring (markExecutionStarted OR setExecutionStartTimestamp) renders Elapsed Xs footer

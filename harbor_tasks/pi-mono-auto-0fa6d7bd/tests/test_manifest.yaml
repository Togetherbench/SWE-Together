version: 1.0
turns:
  - turn: 1
    message: "legacy"
    deliverable: "see instruction.md"
gates:
  - id: f2p_upstream_bash_timing
    kind: F2P
    turn: null
    weight: 0.20
    label: "Behavioral vitest: bash timing method + render"
    command: >-
      cd /workspace/pi-mono && cd packages/tui && npx tsgo -p tsconfig.build.json >/dev/null 2>&1 && cd /workspace/pi-mono &&
      cat > packages/coding-agent/test/_f2p_upstream_bash_timing.test.ts << 'VITESTEOF'

      import { beforeAll, test, expect } from "vitest";
      import stripAnsi from "strip-ansi";
      import type { TUI } from "@mariozechner/pi-tui";
      import { createBashToolDefinition } from "../src/core/tools/bash.js";
      import { ToolExecutionComponent } from "../src/modes/interactive/components/tool-execution.js";
      import { initTheme } from "../src/modes/interactive/theme/theme.js";
      function createFakeTui(): TUI { return { requestRender: () => {} } as unknown as TUI; }
      beforeAll(() => { initTheme("dark"); });
      test("bash timing", () => {
        const bashDef = createBashToolDefinition(process.cwd());
        const component = new ToolExecutionComponent("bash", "b1", { command: "echo hello" }, {}, bashDef, createFakeTui(), process.cwd());
        expect(typeof component.setExecutionStartTimestamp).toBe("function");
        component.markExecutionStarted();
        component.setExecutionStartTimestamp(Date.now() - 12345);
        component.updateResult({ content: [{ type: "text", text: "out" }], isError: false }, true);
        expect(stripAnsi(component.render(120).join("\n"))).toMatch(/Elapsed \d+\.\ds/);
      });

      VITESTEOF

      node_modules/.bin/vitest run packages/coding-agent/test/_f2p_upstream_bash_timing.test.ts >/dev/null 2>&1;
      rc=$?; rm -f packages/coding-agent/test/_f2p_upstream_bash_timing.test.ts; exit $rc
    description: "setExecutionStartTimestamp exists and renders Elapsed Xs timing"
  - id: p2p_upstream_tsgo_typecheck

gates:
  - id: f2p-tests
    kind: F2P
    weight: 0.20
    command: |
      cd /workspace/gemini-voyager
      timeout 120 bun run test 2>&1 | tee /tmp/test-out.txt
      grep -q "0 errors" /tmp/test-out.txt || grep -qE "Tests\s+\d+\s+passed" /tmp/test-out.txt

  - id: f2p-build
    kind: F2P
    weight: 0.15
    command: |
      cd /workspace/gemini-voyager
      timeout 120 bun run build:chrome 2>&1 | tee /tmp/build-out.txt
      grep -qi "built" /tmp/build-out.txt

  - id: f2p-browser-functions
    kind: F2P
    weight: 0.20
    command: |
      python3 -c "
      import re, json
      with open('/workspace/gemini-voyager/src/core/utils/browser.ts') as f: c=f.read()
      ok=re.search(r'export\s+function\s+isMac\b',c) is not None
      ok=ok and re.search(r'export\s+function\s+getModifierKey\b',c) is not None
      if ok:
          m=re.search(r'export\s+function\s+isMac\b',c)
          ok=ok and ('navigator' in c[m.end():m.end()+400])
          m2=re.search(r'export\s+function\s+getModifierKey\b',c)
          ok=ok and ('isMac()' in c[m2.end():m2.end()+200])
      print('PASS' if ok else 'FAIL')
      exit(0 if ok else 1)
      "

  - id: f2p-locales
    kind: F2P
    weight: 0.20
    command: |
      python3 -c "
      import json, os
      r='/workspace/gemini-voyager'
      dirs=['en','ar','es','fr','ja','ko','pt','ru','zh','zh_TW']
      ok=True
      for d in dirs:
          p=os.path.join(r,f'src/locales/{d}/messages.json')
          if os.path.exists(p):
              with open(p) as f: data=json.load(f)
              ces=data.get('ctrlEnterSend',{}).get('message','')
              ceh=data.get('ctrlEnterSendHint',{}).get('message','')
              icsh=data.get('inputCollapseShortcutHint',{}).get('message','')
              if '{modifier}' not in ces or '{modifier}' not in ceh or not icsh:
                  ok=False;break
          else: ok=False;break
      print('PASS' if ok else 'FAIL')
      exit(0 if ok else 1)
      "

  - id: f2p-format-shortcut
    kind: F2P
    weight: 0.15
    command: |
      python3 -c "
      import re
      with open('/workspace/gemini-voyager/src/core/services/KeyboardShortcutService.ts') as f: c=f.read()
      ok='isMac()' in c or re.search(r'import\s+\{[^}]*\bisMac\b[^}]*\}',c)
      print('PASS' if ok else 'FAIL')
      exit(0 if ok else 1)
      "

  - id: f2p-popup
    kind: F2P
    weight: 0.10
    command: |
      python3 -c "
      import re
      with open('/workspace/gemini-voyager/src/pages/popup/Popup.tsx') as f: c=f.read()
      ok=re.search(r'import\s+\{[^}]*getModifierKey[^}]*\}\s+from\s+.@/core/utils/browser',c) is not None
      ok=ok and re.search(r'\.replace\(.{0,5}\{modifier\}.{0,5},',c) is not None
      print('PASS' if ok else 'FAIL')
      exit(0 if ok else 1)
      "

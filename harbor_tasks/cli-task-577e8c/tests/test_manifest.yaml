gates:
  - id: compiles
    kind: F2P
    weight: 0.20
    command: "cd /app && go build ./cmd/entire/cli/agent/opencode/..."
  - id: tests_pass
    kind: F2P
    weight: 0.40
    command: "cd /app && go test ./cmd/entire/cli/agent/opencode/... -count=1 -timeout=60s"
  - id: warn_call_present
    kind: F2P
    weight: 0.15
    command: "cd /app && python3 /tests/check_ast.py /app/cmd/entire/cli/agent/opencode/opencode.go --check=warn_call_present"
  - id: log_has_session_ref
    kind: F2P
    weight: 0.10
    command: "cd /app && python3 /tests/check_ast.py /app/cmd/entire/cli/agent/opencode/opencode.go --check=log_has_session_ref"
  - id: log_has_error
    kind: F2P
    weight: 0.10
    command: "cd /app && python3 /tests/check_ast.py /app/cmd/entire/cli/agent/opencode/opencode.go --check=log_has_error"
  - id: error_branch_handles
    kind: F2P
    weight: 0.05
    command: "cd /app && python3 /tests/check_ast.py /app/cmd/entire/cli/agent/opencode/opencode.go --check=error_branch_handles"

default_reward: 0.0

reward_formula:
  kind: weighted-replace
  weights:
    compiles: 0.20
    tests_pass: 0.40
    warn_call_present: 0.15
    log_has_session_ref: 0.10
    log_has_error: 0.10
    error_branch_handles: 0.05

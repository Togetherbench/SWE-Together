    label: "qwen-qwq-32b reasoning effort maps to default"
    command: "cd /workspace/pi-mono/packages/ai && cat > test/_f2p_qwq_gate.test.ts << 'TESTEOF'\nimport { describe, expect, it, vi } from \"vitest\";\nimport { getModel } from \"../src/models.js\";\nimport { streamSimple } from \"../src/stream.js\";\n\nconst mockState = vi.hoisted(() => ({ lastParams: undefined as any }));\n\nvi.mock(\"openai\", () => {\n  class FakeOpenAI {\n    chat = {\n      completions: {\n        create: (params: any) => {\n          mockState.lastParams = params;\n          const stream = {\n            async *[Symbol.asyncIterator]() {\n              yield {\n                choices: [{ delta: {}, finish_reason: \"stop\" }],\n                usage: {\n                  prompt_tokens: 1,\n                  completion_tokens: 1,\n                  prompt_tokens_details: { cached_tokens: 0 },\n                  completion_tokens_details: { reasoning_tokens: 0 },\n                },\n              };\n            },\n          };\n          const promise = Promise.resolve(stream) as any;\n          promise.withResponse = async () => ({\n            data: stream,\n            response: { status: 200, headers: new Headers() },\n          });\n          return promise;\n        },\n      },\n    };\n  }\n  return { default: FakeOpenAI };\n});\n\ndescribe(\"issue1745 qwen-qwq reasoning mapping\", () => {\n  it(\"maps groq qwen-qwq-32b medium reasoning to default\", async () => {\n    const model = getModel(\"groq\", \"qwen-qwq-32b\")!;\n    let payload: unknown;\n    await streamSimple(\n      model,\n      { messages: [{ role: \"user\", content: \"Hi\", timestamp: Date.now() }] },\n      {\n        apiKey: \"test\",\n        reasoning: \"medium\",\n        onPayload: (params: unknown) => { payload = params; },\n      },\n    ).result();\n    const params = (payload ?? mockState.lastParams) as { reasoning_effort?: string };\n    expect(params.reasoning_effort).toBe(\"default\");\n  });\n});\nTESTEOF\nnpx vitest --run test/_f2p_qwq_gate.test.ts --reporter=verbose 2>&1; rc=$?; rm -f test/_f2p_qwq_gate.test.ts; exit $rc"
    description: "Verifies qwen-qwq-32b reasoning effort is mapped to default on Groq"

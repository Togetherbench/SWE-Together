# Verifier manifest for cli-task-19def0 (source-grep mode).
# See test.sh for the actual gate logic. Σ weights = 1.00 → inner_weight = 0.

gates:
  - id: g1_isstale_method
    kind: F2P
    weight: 0.25
    description: |
      An IsStale() method is defined on *State (or value receiver State) in
      cmd/entire/cli/session/state.go.
    command: |
      grep -qE 'func[[:space:]]+\([[:space:]]*[a-zA-Z_]+[[:space:]]+\*?State[[:space:]]*\)[[:space:]]+IsStale\b' cmd/entire/cli/session/state.go

  - id: g2_load_stale_check
    kind: F2P
    weight: 0.20
    description: |
      StateStore.Load() body invokes IsStale (or equivalent stale check) AND
      either deletes the file (Clear/os.Remove) or returns nil for the stale
      branch.
    command: |
      # Verified by awk extraction in test.sh — extracts Load function body
      # and greps for stale check + delete/return-nil pattern.

  - id: g3_stale_threshold_const
    kind: F2P
    weight: 0.15
    description: |
      A StaleSessionThreshold constant (or equivalent ~7-day duration literal)
      is defined in cmd/entire/cli/session/state.go.
    command: |
      grep -qE 'StaleSessionThreshold|7[[:space:]]*\*[[:space:]]*24[[:space:]]*\*[[:space:]]*time\.Hour' cmd/entire/cli/session/state.go

  - id: g4_strategy_delegates
    kind: F2P
    weight: 0.20
    description: |
      strategy.LoadSessionState() either delegates to session.StateStore (no
      inline json.Unmarshal) OR contains an inline stale check + cleanup.
    command: |
      # Verified by awk extraction in test.sh — extracts LoadSessionState body
      # and checks for store.Load delegation OR inline IsStale + cleanup.

  - id: g5_build_passes
    kind: F2P
    weight: 0.10
    description: |
      The session and strategy packages still compile after the agent's edits.
    command: |
      go build ./cmd/entire/cli/session/... ./cmd/entire/cli/strategy/...

  - id: g6_existing_tests_pass
    kind: F2P
    weight: 0.10
    description: |
      Pre-existing unit tests in session/ and strategy/ still pass (excludes
      table-driven _ subtests to avoid flakiness on agent-added scaffolding).
    command: |
      go test ./cmd/entire/cli/session/ ./cmd/entire/cli/strategy/ -count=1 -timeout 90s -run '^Test[^_]'

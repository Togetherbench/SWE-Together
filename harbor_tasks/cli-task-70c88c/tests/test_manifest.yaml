version: "1.0"
gates:
  # --- P2P regression gates (must all pass; diagnostic/penalty only) ---
  - id: build_succeeds
    kind: P2P
    command: "cd /workspace/cli && go build ./..."
    weight: 0

  - id: flags_intact
    kind: P2P
    command: "cd /workspace/cli && go test ./cmd/entire/cli/ -run '^TestHarbor_FlagsExist$' -count=1"
    weight: 0

  - id: help_flag_works
    kind: P2P
    command: "cd /workspace/cli && go test ./cmd/entire/cli/ -run '^TestHarbor_HelpFlagWorks$' -count=1"
    weight: 0

  # --- F2P feature gates (contribute positive weight when passing) ---
  - id: positional_shows_help
    kind: F2P
    command: "cd /workspace/cli && go test ./cmd/entire/cli/ -run '^TestHarbor_PosShowsHelp$' -count=1"
    weight: 0.20

  - id: help_mentions_qualifier
    kind: F2P
    command: "cd /workspace/cli && go test ./cmd/entire/cli/ -run '^TestHarbor_HelpMentionsFlags$' -count=1"
    weight: 0.15

  - id: stderr_hint
    kind: F2P
    command: "cd /workspace/cli && go test ./cmd/entire/cli/ -run '^TestHarbor_StderrHint$' -count=1"
    weight: 0.10

  - id: existing_tests_pass
    kind: F2P
    command: "cd /workspace/cli && go test ./cmd/entire/cli/ -count=1"
    weight: 0.10

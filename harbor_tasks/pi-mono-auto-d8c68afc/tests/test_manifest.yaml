version: "1.0"
turns:
  - turn: 1
    user_message: "legacy"
    deliverable: "see instruction.md"
gates:
  # Existing inline F2P gates (scaled from original weights to accommodate upstream)
  - id: f2p_shutdown_handler_key
    kind: F2P
    turn: 1
    weight: 0.12
    command: "echo 'inline in test.sh'"
    description: "shutdownHandler key exists and sets shutdownRequested"
  - id: f2p_deferred_shutdown_drain
    kind: F2P
    turn: 1
    weight: 0.24
    command: "echo 'inline in test.sh'"
    description: "deferred-shutdown drain path exists"
  - id: f2p_shutdown_deferred_streaming
    kind: F2P
    turn: 1
    weight: 0.16
    command: "echo 'inline in test.sh'"
    description: "shutdown deferred when streaming"
  - id: f2p_shutdown_invoked_idle
    kind: F2P
    turn: 1
    weight: 0.12
    command: "echo 'inline in test.sh'"
    description: "shutdown invoked when idle"
  - id: f2p_example_reachable_cmd
    kind: F2P
    turn: 1
    weight: 0.16
    command: "echo 'inline in test.sh'"
    description: "example registers a reachable slash command"
  # Upstream F2P gate
  - id: f2p_upstream_example_cmd
    kind: F2P
    turn: null
    weight: 0.20
    command: "cd /workspace/pi-mono && npx tsx -e \"import ext from './packages/coding-agent/examples/extensions/shutdown-command.ts'; let cmdName = ''; const api = { registerCommand: (name) => { cmdName = name; }, registerTool: () => {} }; ext(api); if (cmdName === 'quit') { console.log('FAIL: registers built-in /quit'); process.exit(1); } console.log('PASS: registers /' + cmdName);\""
    description: "Loads shutdown-command example and verifies non-conflicting command registration"
  # P2P regression gates
  - id: p2p_upstream_tsgo
    kind: P2P_REGRESSION
    turn: null
    weight: 0
    command: "cd /workspace/pi-mono && npx tsgo --noEmit"
    description: "TypeScript type-checking via tsgo"
  - id: p2p_upstream_biome
    kind: P2P_REGRESSION
    turn: null
    weight: 0
    command: "cd /workspace/pi-mono && npx biome check --error-on-warnings packages/coding-agent/src/modes/interactive/interactive-mode.ts packages/coding-agent/src/modes/print-mode.ts packages/coding-agent/examples/extensions/shutdown-command.ts packages/coding-agent/src/core/extensions/types.ts"
    description: "Biome lint/format check on changed files"
  - id: p2p_upstream_vitest_examples
    kind: P2P_REGRESSION
    turn: null
    weight: 0
    command: "cd /workspace/pi-mono && npx vitest run packages/coding-agent/test/trigger-compact-extension.test.ts packages/coding-agent/test/compaction-extensions-example.test.ts"
    description: "Vitest tests for example extensions pass"

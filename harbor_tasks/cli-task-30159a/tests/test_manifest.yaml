version: "1.0"
task: cli-task-30159a

gates:
  # F2P: Fitness-to-Proceed gates (behavioral + structural, weighted)
  - id: test_update_command_deterministic
    kind: F2P
    weight: 0.25
    description: "TestUpdateCommand passes with >= 5 deterministic subtests"
    command: "go test ./cmd/entire/cli/versioncheck/ -run '^TestUpdateCommand$' -v -count=1"

  - id: all_tests_pass
    kind: F2P
    weight: 0.20
    description: "All tests in versioncheck package pass (no regressions)"
    command: "go test ./cmd/entire/cli/versioncheck/ -count=1"

  - id: no_direct_os_executable
    kind: F2P
    weight: 0.15
    description: "updateCommand does not call os.Executable() directly (AST check)"
    command: "go run /tmp/ast_os_exec.go"

  - id: specific_path_detection
    kind: F2P
    weight: 0.15
    description: "Path patterns are specific enough to avoid username false positives (AST check)"
    command: "go run /tmp/ast_paths.go"

  - id: test_uses_table_driven
    kind: F2P
    weight: 0.15
    description: "TestUpdateCommand uses table-driven subtests with t.Run (AST check)"
    command: "go run /tmp/ast_table.go"

  - id: exec_path_indirection
    kind: F2P
    weight: 0.10
    description: "Package-level function-type variable exists for executable path indirection (AST check)"
    command: "go run /tmp/ast_var.go"

  # P2P: Pass-to-Proceed gates (gating only, no positive weight)
  - id: p2p_go_mod_exists
    kind: P2P_REGRESSION
    weight: 0.0
    description: "go.mod exists and is valid"
    command: "test -f /workspace/cli/go.mod"

  - id: p2p_source_files_exist
    kind: P2P_REGRESSION
    weight: 0.0
    description: "versioncheck source files exist"
    command: "test -f /workspace/cli/cmd/entire/cli/versioncheck/versioncheck.go && test -f /workspace/cli/cmd/entire/cli/versioncheck/versioncheck_test.go"

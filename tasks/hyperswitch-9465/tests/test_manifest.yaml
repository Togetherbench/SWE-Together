  command: cd /workspace/hyperswitch && grep -rq 'active_attempts_group_id' migrations/
    v2_compatible_migrations/ && grep -rq 'active_attempt_id_type' migrations/ v2_compatible_migrations/
    && grep -rq 'attempts_group_id' migrations/ v2_compatible_migrations/

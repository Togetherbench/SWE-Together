  kind: P2P_REGRESSION
  turn: null
  weight: 0
  label: Domain + Kafka field propagation (diagnostic only, v3 rubric demotes to bonus)
  command: cd /workspace/hyperswitch && grep -q 'active_attempts_group_id' crates/hyperswitch_domain_models/src/payments.rs
    && grep -q 'active_attempt_id_type' crates/hyperswitch_domain_models/src/payments.rs

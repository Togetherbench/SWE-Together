- id: p2p_upstream_cargo_metadata
  kind: P2P_REGRESSION
  turn: null
  weight: 0
  label: Cargo metadata workspace integrity
  command: cd /workspace/hyperswitch && export PATH=/usr/local/cargo/bin:/root/.cargo/bin:$PATH
    && timeout 60 cargo metadata --format-version 1 --no-deps > /dev/null 2>&1
